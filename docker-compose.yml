version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sdlc-hub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sdlc
      POSTGRES_PASSWORD: sdlc_password
      POSTGRES_DB: sdlc_hub
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sdlc -d sdlc_hub']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sdlc-hub-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
